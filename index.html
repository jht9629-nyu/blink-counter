<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blink Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #container {
      position: relative;
      display: inline-block;
    }
    #video {
      display: block;
      border-radius: 12px;
      transform: scaleX(-1);
      width: 640px;
      height: 480px;
      object-fit: cover;
    }
    /* Canvas mirrors the video so drawn landmarks align */
    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 640px;
      height: 480px;
      border-radius: 12px;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #status {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #888;
      letter-spacing: 0.05em;
    }
    #reset-btn {
      margin-top: 12px;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #reset-btn:hover { border-color: #00c8ff; color: #00c8ff; }
  </style>
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="status">Loading MediaPipe…</div>
  <button id="reset-btn">Reset counter</button>

  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver,
      DrawingUtils
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const status   = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');

    // EAR landmark indices (MediaPipe 468-point mesh)
    const LEFT_EYE  = [362, 385, 387, 263, 373, 380];
    const RIGHT_EYE = [33,  160, 158, 133, 153, 144];

    const EAR_THRESHOLD = 0.22;
    const CONSEC_FRAMES = 2;

    let blinkCount      = 0;
    let leftClosed      = 0;
    let rightClosed     = 0;
    let blinkRegistered = false;

    function ear(lm, idx) {
      const p = idx.map(i => lm[i]);
      const A = dist(p[1], p[5]);
      const B = dist(p[2], p[4]);
      const C = dist(p[0], p[3]);
      return (A + B) / (2 * C);
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function drawCounter(lm) {
      const minY = Math.min(...lm.map(p => p.y));
      // Nose tip x raw; after counter-flip transform, tx = canvas.width - cx lands at correct screen x
      const cx = lm[1].x * canvas.width;
      const cy = (minY * canvas.height) - 18;

      const text = `Blinks: ${blinkCount}`;
      ctx.save();
      // Counter-flip the context so text renders readable (canvas CSS is scaleX(-1))
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      // After this transform, draw at (canvas.width - cx) to land at cx on screen
      const tx = canvas.width - cx;

      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';

      const metrics = ctx.measureText(text);
      const pw = metrics.width + 28;
      const ph = 40;
      const px = tx - pw / 2;
      const py = cy - ph;

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 10);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0,200,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 10);
      ctx.stroke();

      ctx.fillStyle = '#00c8ff';
      ctx.shadowColor = '#00c8ff';
      ctx.shadowBlur = 10;
      ctx.fillText(text, tx, cy);
      ctx.restore();
    }

    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: 'user' }
      });
      video.srcObject = stream;
      return new Promise(res => video.onloadedmetadata = () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        res();
      });
    }

    async function main() {
      await startCamera();
      status.textContent = 'Initializing face detector…';

      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      const landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        outputFaceBlendshapes: false,
        runningMode: "VIDEO",
        numFaces: 1
      });

      status.textContent = 'Tracking — blink away!';

      const drawUtils = new DrawingUtils(ctx);
      let lastVideoTime = -1;

      function detect() {
        if (video.currentTime !== lastVideoTime) {
          lastVideoTime = video.currentTime;
          const result = landmarker.detectForVideo(video, performance.now());

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          if (result.faceLandmarks && result.faceLandmarks.length > 0) {
            const lm = result.faceLandmarks[0];

            // Eye outlines
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
              { color: 'rgba(0,200,255,0.85)', lineWidth: 1.5 });
            drawUtils.drawConnectors(lm, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
              { color: 'rgba(0,200,255,0.85)', lineWidth: 1.5 });

            // Blink detection
            const leftEAR  = ear(lm, LEFT_EYE);
            const rightEAR = ear(lm, RIGHT_EYE);

            if (leftEAR  < EAR_THRESHOLD) leftClosed++;  else leftClosed  = 0;
            if (rightEAR < EAR_THRESHOLD) rightClosed++; else rightClosed = 0;

            const bothClosed = leftClosed >= CONSEC_FRAMES && rightClosed >= CONSEC_FRAMES;

            if (bothClosed && !blinkRegistered) {
              blinkCount++;
              blinkRegistered = true;
            }
            if (!bothClosed) blinkRegistered = false;

            // Draw counter above head on canvas
            drawCounter(lm);
          }
        }
        requestAnimationFrame(detect);
      }

      detect();
    }

    resetBtn.addEventListener('click', () => { blinkCount = 0; });

    main().catch(err => {
      status.textContent = `Error: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
